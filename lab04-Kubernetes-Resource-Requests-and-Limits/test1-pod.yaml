apiVersion: v1
kind: Pod

metadata:
  name: resources

spec:
  containers:
    - name: testcon
      image: nginx

      command:
        - "/bin/bash"
        - "-c"
        - "while true; do echo 'Pod created'; sleep 50; done"

      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"

        limits:
          memory: "128Mi"
          cpu: "200m"
